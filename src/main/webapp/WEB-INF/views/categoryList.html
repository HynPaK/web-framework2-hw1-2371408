<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Category Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary">카테고리 관리</h2>
        <a th:href="@{/categories/new}" class="btn btn-success">새 카테고리 등록</a>
    </div>

    <table class="table table-hover table-striped border">
        <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>카테고리 명</th>
            <th class="text-center">관리</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="category : ${categories}">
            <td th:text="${category.id}">1</td>
            <td><strong th:text="${category.name}">전자제품</strong></td>
            <td class="text-center">
                <a th:href="@{/categories/edit/{id}(id=${category.id})}" class="btn btn-sm btn-outline-primary">수정</a>
                <a th:href="@{/categories/delete/{id}(id=${category.id})}" class="btn btn-sm btn-outline-danger">삭제</a>
            </td>
        </tr>
        </tbody>
    </table>
    <footer class="mt-5 pt-3 border-top text-center text-muted">
        <p th:text="${'실습 수행 일시: ' + #temporals.format(#temporals.createNow(), 'yyyy년 MM월 dd일 (E) a hh:mm:ss') + ' | 학번: 2371408 | 성명: 박규현'}"></p>
    </footer>
</div> </body>
</html>
